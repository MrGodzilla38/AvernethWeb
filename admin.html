<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Paneli — Averneth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body data-api-base="">
  <div class="noise"></div>
  
  <header class="topbar">
    <div class="container topbar__inner">
      <a href="index.html" class="brand">
        <img src="assets/averneth-logo.png" alt="Averneth" class="brand__logo">
        <span class="brand__text">AVERNETH</span>
      </a>
      <nav class="nav">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Ana Sayfa</a></li>
          <li><a href="admin.html" class="nav__link nav__link--active">Admin Paneli</a></li>
        </ul>
      </nav>
      <div class="topbar__actions">
        <div id="user-info" class="user-info"></div>
        <button id="logout-btn" class="btn btn--ghost btn--sm">Çıkış Yap</button>
      </div>
    </div>
  </header>

  <nav class="admin-tabs-nav">
    <div class="container">
      <ul class="admin-tabs">
        <li class="admin-tabs__item">
          <a href="#" class="admin-tabs__link admin-tabs__link--active">Kullanıcı Yönetimi</a>
        </li>
        <li class="admin-tabs__item">
          <a href="#" class="admin-tabs__link admin-tabs__link--disabled">Mağaza Düzenleme <span class="badge badge--soon">Yakında</span></a>
        </li>
        <li class="admin-tabs__item">
          <a href="#" class="admin-tabs__link admin-tabs__link--disabled">Wiki Düzenleme <span class="badge badge--soon">Yakında</span></a>
        </li>
        <li class="admin-tabs__item">
          <a href="#" class="admin-tabs__link admin-tabs__link--disabled">Sunucu Ayarları <span class="badge badge--soon">Yakında</span></a>
        </li>
      </ul>
    </div>
  </nav>

  <main class="admin-main">
    <div class="container">
      <div class="admin-header">
        <h1 class="admin-title">Kullanıcı Yönetimi</h1>
        <p class="admin-subtitle">Tüm kayıtlı kullanıcıları buradan yönetebilirsiniz.</p>
      </div>

      <div class="admin-card">
        <div class="table-responsive">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Kullanıcı Adı</th>
                <th>E-posta</th>
                <th>Rank</th>
                <th>Balance</th>
                <th>İşlemler</th>
              </tr>
            </thead>
            <tbody id="user-table-body">
              <!-- Veriler JS ile buraya gelecek -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Düzenleme Modalı -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <h2 class="modal-title">Kullanıcı Düzenle</h2>
      <form id="edit-user-form">
        <input type="hidden" id="edit-user-id">
        <div class="form-group">
          <label for="edit-user-rank">Rank</label>
          <select id="edit-user-rank" class="form-input">
            <option value="Üye">Üye</option>
            <option value="Rehber">Rehber</option>
            <option value="Moderatör">Moderatör</option>
            <option value="Admin">Admin</option>
            <option value="Baş Yönetici">Baş Yönetici</option>
            <option value="Kurucu">Kurucu</option>
          </select>
        </div>
        <div class="form-group">
          <label for="edit-user-balance">Balance</label>
          <input type="number" id="edit-user-balance" class="form-input" step="0.01">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn--ghost" onclick="closeModal()">İptal</button>
          <button type="submit" class="btn btn--primary">Kaydet</button>
        </div>
      </form>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
